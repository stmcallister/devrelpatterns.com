baseURL = "https://devrelpatterns.com"
languageCode = "en-us"
title = "Developer Relations Activity Patterns"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
enableEmoji = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  mainSections = ["blog"]
  author = "The DevRel Patterns Authors"
  description = "A companion site for the book Developer Relations Activity Patterns — practical patterns for building and scaling developer relations programs."
  keywords = ["developer relations", "devrel", "activity patterns", "developer advocacy"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = true

  [params.homeInfoParams]
    Title = "Developer Relations Activity Patterns"
    Content = """
A practical guide for developer relations professionals. Written by practitioners, for practitioners.

**Developer Relations Activity Patterns** catalogs proven patterns for building, scaling, and sustaining
effective developer relations programs. Whether you're a solo DevRel or part of a large team, this book
provides a shared vocabulary and battle-tested approaches for your work.
"""

  # Giscus comments — fill these in after running https://giscus.app with your repo
  [params.giscus]
    repo = "stmcallister/devrelpatterns.com"
    data-category="Comments"
    repoId = "R_kgDORrzXaw"
    category = "Announcements"
    categoryId = "DIC_kwDORrzXa84C41gv"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stmcallister/devrelpatterns.com"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About the Book"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 20
  [[menu.main]]
    identifier = "videos"
    name = "Videos"
    url = "/videos/"
    weight = 30
  [[menu.main]]
    identifier = "authors"
    name = "Authors"
    url = "/authors/"
    weight = 40
  [[menu.main]]
    identifier = "buy"
    name = "Buy the Book"
    url = "https://link.springer.com/book/10.1007/979-8-8688-1895-0"
    weight = 50
