{{ define "main" }}
<div class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ with .Description }}<p class="post-description">{{ . }}</p>{{ end }}
  </header>

  <div class="videos-grid">
    {{ range .Pages }}
    <div class="video-card">
      <a href="https://www.youtube.com/watch?v={{ .Params.youtube_id }}" target="_blank" rel="noopener noreferrer">
        <div class="video-thumbnail">
          <img
            src="https://img.youtube.com/vi/{{ .Params.youtube_id }}/hqdefault.jpg"
            alt="{{ .Title }}"
            loading="lazy"
          />
          <div class="video-play-overlay">&#9654;</div>
        </div>
        <div class="video-info">
          <h3>{{ .Title }}</h3>
          <p>{{ .Description }}</p>
        </div>
      </a>
    </div>
    {{ end }}
  </div>
</div>

<style>
.videos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2rem;
  margin-top: 2rem;
}
.video-card a {
  text-decoration: none;
  color: inherit;
  display: block;
}
.video-thumbnail {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  overflow: hidden;
  border-radius: 8px;
}
.video-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.2s;
}
.video-card:hover .video-thumbnail img {
  opacity: 0.85;
}
.video-play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  opacity: 0;
  transition: opacity 0.2s;
}
.video-card:hover .video-play-overlay {
  opacity: 1;
}
.video-info h3 {
  margin: 0.75rem 0 0.25rem;
  font-size: 1rem;
}
.video-info p {
  margin: 0;
  font-size: 0.875rem;
  opacity: 0.75;
}
</style>
{{ end }}
