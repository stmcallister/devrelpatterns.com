{{ define "main" }}
<div class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ with .Description }}<p class="post-description">{{ . }}</p>{{ end }}
  </header>

  {{ with .Params.youtube_id }}
  <div class="video-embed">
    <iframe
      src="https://www.youtube.com/embed/{{ . }}"
      title="{{ $.Title }}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen
    ></iframe>
  </div>
  <p class="video-youtube-link">
    <a href="https://www.youtube.com/watch?v={{ . }}" target="_blank" rel="noopener noreferrer">Watch on YouTube</a>
  </p>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>
</div>

<style>
.video-embed {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  margin: 1.5rem 0 0.75rem;
}
.video-embed iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border-radius: 8px;
}
.video-youtube-link {
  font-size: 0.875rem;
  margin-bottom: 2rem;
}
</style>
{{ end }}
